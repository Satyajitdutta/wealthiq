<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Salary Benchmarking — Know Your Market Value | Artha-IQ</title>
<meta name="description" content="Compare your salary against 200+ GCC roles. Identify pay gaps, highest-ROI skill upgrades, and negotiation data for your next appraisal.">

<meta name="robots" content="index, follow">
<link rel="canonical" href="https://wealth.pithonix.ai/salary-benchmarking.html">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#030305;color:#f0f0f8;padding-top:80px;overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;justify-content:space-between;padding:1.25rem 2.5rem;background:rgba(3,3,5,.88);backdrop-filter:blur(24px)}
.n-wm{font-size:1.05rem;font-weight:800;color:#fff}
.n-cta{background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:100px;padding:.6rem 1.4rem;color:#fff;cursor:pointer}
.hero{padding:6rem 2rem 4rem;text-align:center;max-width:900px;margin:0 auto}
.hero h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;color:#fff;margin-bottom:1.5rem}
.hero p{font-size:1.1rem;color:#8892a4;max-width:640px;margin:0 auto 2.5rem;line-height:1.7}
.stat{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.16);border-radius:14px;padding:2rem;margin:1.5rem 0;text-align:center}
.stat-val{font-size:1.8rem;font-weight:900;color:#6366f1}
.stat-label{font-size:.9rem;color:#8892a4;margin-top:.5rem}
.cta-btn{background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:100px;padding:1.2rem 3rem;color:#fff;font-size:1.05rem;font-weight:800;cursor:pointer;display:block;margin:2rem auto}
footer{border-top:1px solid rgba(255,255,255,.07);padding:2.5rem 2rem;text-align:center;margin-top:6rem;color:#4a5568;font-size:.8rem}
.am-bg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center}
.am-bg.open{display:flex}
.am-box{background:#0a0f1e;border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:2.5rem;max-width:420px;width:100%}
.am-inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:.9rem;color:#fff;margin-bottom:1rem}
.am-btn{width:100%;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:12px;padding:1rem;color:#fff;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<nav>
<a href="/"><span class="n-wm">Artha<em style="font-style:normal;background:linear-gradient(90deg,#3b82f6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent">-IQ</em></span></a>
<button class="n-cta" onclick="openAuth()">Sign In</button>
</nav>

<div class="hero">
<h1>Salary Benchmarking</h1>
<p>Are you earning market rate? Compare against 200+ GCC, BFSI, and IT roles. Identify your pay gap and highest-ROI skill upgrades.</p>
<div class="stat"><div class="stat-val">15-25%</div><div class="stat-label">Average pay gap most GCC employees discover</div></div>
<div class="stat"><div class="stat-val">₹2-4L</div><div class="stat-label">Typical annual underpayment identified</div></div>
<button class="cta-btn" onclick="openAuth('salary')">Benchmark Your Salary →</button>
</div>

<footer>© 2026 Pithonix AI. Know your worth.</footer>

<div class="am-bg" id="amBg" onclick="if(event.target===event.currentTarget)closeAuth()">
<div class="am-box">
<button onclick="closeAuth()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:#fff;cursor:pointer">✕</button>
<input class="am-inp" id="am-email" type="email" placeholder="you@company.com">
<button class="am-btn" onclick="amSend()">Compare My Salary →</button>
</div>
</div>

<script>
function openAuth(){document.getElementById('amBg').classList.add('open')}
function closeAuth(){document.getElementById('amBg').classList.remove('open')}
async function amSend(){const email=document.getElementById('am-email').value;if(!email)return;await fetch('/api/auth-send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});setTimeout(()=>window.location.replace('/app?m=salary'),300)}
</script>
</body>
</html>
